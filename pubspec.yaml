name: parking_hunter
description: Gamified crowd-sourced parking finder app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # Firebase
  firebase_core: ^3.6.0
  cloud_firestore: ^5.4.4
  firebase_auth: ^5.3.1
  firebase_storage: ^12.3.2
  firebase_messaging: ^15.1.3
  # Auth
  google_sign_in: ^6.2.1
  sign_in_with_apple: ^6.1.1
  # Maps (OpenStreetMap — no API key required)
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  # Location
  geolocator: ^13.0.1
  geocoding: ^3.0.0
  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  # Navigation
  go_router: ^14.3.0
  # Image
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1
  # UI
  lottie: ^3.1.2
  flutter_animate: ^4.5.0
  percent_indicator: ^4.2.3
  # Ads
  google_mobile_ads: ^5.1.0
  # Utils
  url_launcher: ^6.3.0
  intl: ^0.19.0
  uuid: ^4.5.1
  equatable: ^2.0.5
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  shared_preferences: ^2.3.3
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.12
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.3
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.3

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/

# App icon config (run: dart run flutter_launcher_icons)
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#FF6B35"
  adaptive_icon_foreground: "assets/images/app_icon_foreground.png"
  web:
    generate: false

# Native splash config (run: dart run flutter_native_splash:create)
flutter_native_splash:
  color: "#FF6B35"
  image: assets/images/app_icon.png
  android: true
  ios: true
  android_12:
    image: assets/images/app_icon.png
    color: "#FF6B35"
